<div class="form-container">
  <div class="header">
    <a routerLink="/" class="btn-icon">←</a>
    <h2>{{ isEditMode ? 'Edit Task' : 'Add New Task' }}</h2>
  </div>

  <form #taskForm="ngForm" (ngSubmit)="saveTask(taskForm)">
    <div class="input-group">
      <label for="title">Title <span class="required">*</span></label>
      <input 
        type="text" 
        id="title" 
        name="title" 
        [(ngModel)]="task.title" 
        #title="ngModel"
        required 
        minlength="3"
        maxlength="100"
        placeholder="e.g. Finish the project"
      />
      <div *ngIf="title.invalid && (title.dirty || title.touched)" class="error">
        <span *ngIf="title.errors?.['required']">Title is required.</span>
        <span *ngIf="title.errors?.['minlength']">Title must be at least 3 characters.</span>
      </div>
    </div>

    <div class="input-group">
      <label for="description">Description</label>
      <textarea 
        id="description" 
        name="description" 
        [(ngModel)]="task.description" 
        placeholder="Optional details..."
        rows="4"
      ></textarea>
    </div>

    <div *ngIf="isEditMode" class="input-group checkbox-group">
      <label class="toggle">
        <input type="checkbox" name="isCompleted" [(ngModel)]="task.isCompleted">
        <span class="slider round"></span>
        Mark as Completed
      </label>
    </div>

    <div class="form-actions">
      <button type="button" routerLink="/" class="btn-secondary">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="taskForm.invalid">
        {{ isEditMode ? 'Save Changes' : 'Create Task' }}
      </button>
    </div>
  </form>
</div>
